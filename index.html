<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Criollos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --cream: #F5EDD6;
    --dark: #0A0A08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Raleway', sans-serif;
    cursor: none;
  }

  /* ── SLIDES ── */
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transform: scale(1.04);
    transition: transform 7s ease-out;
  }

  .slide.active img {
    transform: scale(1);
  }

  /* ── OVERLAYS ── */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top, rgba(10,10,8,0.85) 0%, rgba(10,10,8,0.1) 40%, transparent 70%),
      linear-gradient(to right, rgba(10,10,8,0.4) 0%, transparent 50%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── BRAND MARK ── */
  .brand {
    position: fixed;
    top: 40px;
    left: 48px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 2s ease 0.5s forwards;
    background: rgba(0,0,0,0.45);
    padding: 12px 20px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .brand-rule {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 12px 0 10px;
  }

  .brand-sub {
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }

  /* ── BOTTOM UI ── */
  .bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 64px 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    opacity: 0;
    animation: fadeIn 2s ease 1s forwards;
  }

  /* Counter */
  .counter {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(245,237,214,0.5);
    font-size: 13px;
    letter-spacing: 0.2em;
  }

  .counter span {
    color: var(--gold);
    font-style: normal;
    font-size: 22px;
    font-weight: 600;
    margin-right: 6px;
  }

  /* Progress dots */
  .dots {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .dot {
    width: 24px;
    height: 1px;
    background: rgba(201,168,76,0.3);
    transition: all 0.6s ease;
    cursor: pointer;
  }

  .dot.active {
    width: 48px;
    background: var(--gold);
  }

  /* Progress bar */
  .progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--gold);
    width: 0%;
    z-index: 20;
    opacity: 0.7;
  }

  /* ── CORNER DECORATION ── */
  .corner {
    position: fixed;
    bottom: 48px;
    right: 64px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 2s ease 1.2s forwards;
    text-align: right;
  }

  .corner-text {
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    font-size: 10px;
    color: rgba(201,168,76,0.6);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Brand -->
<div class="brand">
  <img src="criollos-logo.png" alt="Criollos Burger" style="height:90px; width:auto; display:block;">
</div>

<!-- Bottom -->
<div class="bottom">
  <div></div>
  <div class="dots" id="dots"></div>
</div>

<!-- Bottom right: tagline -->
<div class="corner">
  <div class="corner-text">Puerto de la Cruz</div>
</div>

<!-- Progress bar -->
<div class="progress" id="progress"></div>

<script>
  const DURATION = 10000;
  const slides = document.querySelectorAll('.slide');
  const dotsEl = document.getElementById('dots');
  const progressEl = document.getElementById('progress');
  let current = 0;

  const total = slides.length;

  // Build dots (max 12 visible for clean look)
  const dotCount = Math.min(total, 12);
  for (let i = 0; i < dotCount; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  }
  const dots = document.querySelectorAll('.dot');

  function goTo(index) {
    slides[current].classList.remove('active');
    if (dots[current % dotCount]) dots[current % dotCount].classList.remove('active');
    current = (index + total) % total;
    slides[current].classList.add('active');
    if (dots[current % dotCount]) dots[current % dotCount].classList.add('active');
      startProgress();
  }

  function startProgress() {
    progressEl.style.transition = 'none';
    progressEl.style.width = '0%';
    progressEl.offsetWidth;
    progressEl.style.transition = `width ${DURATION}ms linear`;
    progressEl.style.width = '100%';
  }

  startProgress();
  setInterval(() => goTo(current + 1), DURATION);
</script>
